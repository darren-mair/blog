baseURL = 'https://darren-mair.github.io/blog/'
languageCode = 'en-us'
title = "Darren's Blog"
theme = 'PaperMod'
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  title = "Darren's Blog"
  description = "A personal blog about technology, software development, and more."
  keywords = ['Blog', 'Portfolio', 'PaperMod']
  author = 'Darren Mair'
  DateFormat = 'January 2, 2006'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.homeInfoParams]
    Title = "Hi there 👋"
    Content = "Welcome to my personal blog. I write about technology, software development, and things I find interesting."

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/darren-mair'

  [[params.socialIcons]]
    name = 'rss'
    url = '/index.xml'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10

  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20

  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 30

  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']
