<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1428;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f5a5f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#backgroundGradient)"/>
  
  <!-- Main Content -->
  <g id="content">
    <!-- Title -->
    <text x="100" y="115" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">
      Automated SentinelOne Deployment
    </text>
    
    <!-- Subtitle -->
    <text x="100" y="160" font-family="Arial, sans-serif" font-size="18" fill="#d0d0d0">
      Fully Automated Agent deployment in Azure
    </text>
    
    <!-- Underline accent -->
    <line x1="100" y1="175" x2="250" y2="175" stroke="#00bcd4" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Icons on the right -->
  <g id="icons">
    <!-- Purple Shield Icon -->
    <g transform="translate(1020, 100)">
      <rect x="0" y="0" width="80" height="80" rx="16" fill="#b71dea"/>
      <g transform="translate(40, 40)">
        <path d="M 0 -20 L -12 -10 L -12 5 C -12 20 0 32 0 32 C 0 32 12 20 12 5 L 12 -10 Z" 
              fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="0" cy="8" r="3" fill="#ffffff"/>
      </g>
    </g>
    
    <!-- Cyan Cloud Icon -->
    <g transform="translate(1110, 100)">
      <rect x="0" y="0" width="80" height="80" rx="16" fill="#00bcd4"/>
      <g transform="translate(40, 40)">
        <path d="M -17 5 C -21 5 -24 2 -24 -2 C -24 -5 -22.5 -7.5 -20 -8.5 C -20 -8.5 -20 -9 -20 -9.5 C -20 -14 -16 -18 -11 -18 C -8.5 -18 -6 -17 -4.5 -15 C -3 -16 -1.5 -16.5 0.5 -16.5 C 7 -16.5 12.5 -11 12.5 -4.5 C 12.5 -4 12.5 -3.5 12.5 -3 C 15.5 -2 17.5 1 17.5 4.5 C 17.5 9 14 12.5 9.5 12.5 Z" 
              fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>