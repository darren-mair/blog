<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GitHub repository setup placeholder</title>
  <desc id="desc">Placeholder image for a screenshot showing a GitHub Pages repository named username.github.io.</desc>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="70" y="70" width="1060" height="490" rx="24" fill="#111827" stroke="#334155" stroke-width="4"/>
  <text x="110" y="150" fill="#93c5fd" font-size="28" font-family="Segoe UI, Arial, sans-serif">Screenshot Placeholder</text>
  <text x="110" y="240" fill="#ffffff" font-size="54" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Create a public repo named</text>
  <text x="110" y="320" fill="#fbbf24" font-size="60" font-weight="700" font-family="Consolas, monospace">username.github.io</text>
  <text x="110" y="405" fill="#cbd5e1" font-size="28" font-family="Segoe UI, Arial, sans-serif">Use your actual GitHub username in place of username.</text>
  <text x="110" y="455" fill="#cbd5e1" font-size="28" font-family="Segoe UI, Arial, sans-serif">This is the repo GitHub Pages will publish for your personal site.</text>
</svg>