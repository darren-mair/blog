<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Local Hugo server placeholder</title>
  <desc id="desc">Placeholder image for a screenshot of Hugo server running locally at localhost:1313.</desc>
  <rect width="1200" height="630" fill="#111827"/>
  <rect x="80" y="80" width="1040" height="470" rx="18" fill="#020617" stroke="#475569" stroke-width="4"/>
  <text x="120" y="145" fill="#86efac" font-size="30" font-family="Segoe UI, Arial, sans-serif">Terminal Output Placeholder</text>
  <text x="120" y="235" fill="#e2e8f0" font-size="34" font-family="Consolas, monospace">$ hugo server</text>
  <text x="120" y="310" fill="#38bdf8" font-size="30" font-family="Consolas, monospace">Web Server is available at http://localhost:1313/</text>
  <text x="120" y="375" fill="#cbd5e1" font-size="28" font-family="Segoe UI, Arial, sans-serif">Use this spot for a screenshot of your local site running.</text>
  <text x="120" y="425" fill="#cbd5e1" font-size="28" font-family="Segoe UI, Arial, sans-serif">A browser preview or terminal capture both work well here.</text>
</svg>