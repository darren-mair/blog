<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Azure DevOps Guide Banner</title>
  <desc id="desc">A stylized Azure DevOps themed header image with pipeline flow and security motif.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081a2f"/>
      <stop offset="55%" stop-color="#0d2f57"/>
      <stop offset="100%" stop-color="#0a4a86"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f6cbd"/>
      <stop offset="100%" stop-color="#1398ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.16">
    <circle cx="1250" cy="180" r="260" fill="#2dd4bf"/>
    <circle cx="300" cy="760" r="320" fill="#38bdf8"/>
  </g>

  <g opacity="0.28" stroke="#8fd3ff" stroke-width="2" fill="none">
    <path d="M120 640 C 300 520, 420 710, 600 590 S 900 510, 1060 590 S 1320 730, 1500 610"/>
    <path d="M120 700 C 300 580, 420 770, 600 650 S 900 570, 1060 650 S 1320 790, 1500 670"/>
  </g>

  <g transform="translate(140 170)">
    <rect x="0" y="0" width="760" height="430" rx="24" fill="#071424" opacity="0.78" stroke="#2a5d90"/>

    <text x="44" y="84" fill="#d7ebff" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      <tspan x="44" dy="0">Azure DevOps Best</tspan>
      <tspan x="44" dy="58">Practices</tspan>
    </text>
    <text x="44" y="176" fill="#9cc7f2" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="500">
      End-to-End Delivery and Security Guide
    </text>

    <g transform="translate(44 196)">
      <rect width="190" height="56" rx="12" fill="url(#card)"/>
      <text x="24" y="36" fill="#ffffff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Boards</text>

      <rect x="224" width="190" height="56" rx="12" fill="url(#card)"/>
      <text x="276" y="36" fill="#ffffff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Repos</text>

      <rect x="448" width="250" height="56" rx="12" fill="url(#card)"/>
      <text x="488" y="36" fill="#ffffff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pipelines</text>
    </g>

    <g transform="translate(50 312)" stroke="#61b8ff" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M15 12 H210"/>
      <path d="M240 12 H420"/>
      <path d="M450 12 H650"/>
      <polygon points="206,12 194,4 194,20" fill="#61b8ff" stroke="none"/>
      <polygon points="416,12 404,4 404,20" fill="#61b8ff" stroke="none"/>
      <polygon points="646,12 634,4 634,20" fill="#61b8ff" stroke="none"/>
    </g>

    <g transform="translate(50 350)">
      <rect x="0" y="0" width="130" height="38" rx="10" fill="#0f3d66" stroke="#2f83c9"/>
      <text x="20" y="25" fill="#d8ecff" font-size="20" font-family="Segoe UI, Arial, sans-serif">CI</text>

      <rect x="160" y="0" width="170" height="38" rx="10" fill="#0f3d66" stroke="#2f83c9"/>
      <text x="180" y="25" fill="#d8ecff" font-size="20" font-family="Segoe UI, Arial, sans-serif">Approval</text>

      <rect x="360" y="0" width="170" height="38" rx="10" fill="#0f3d66" stroke="#2f83c9"/>
      <text x="382" y="25" fill="#d8ecff" font-size="20" font-family="Segoe UI, Arial, sans-serif">Security</text>

      <rect x="560" y="0" width="130" height="38" rx="10" fill="#0f3d66" stroke="#2f83c9"/>
      <text x="579" y="25" fill="#d8ecff" font-size="20" font-family="Segoe UI, Arial, sans-serif">CD</text>
    </g>
  </g>

  <g transform="translate(1020 180)" filter="url(#softGlow)">
    <path d="M160 0 L300 82 L246 264 L74 292 L0 118 Z" fill="#1a7fd7" opacity="0.85"/>
    <path d="M160 0 L300 82 L202 148 L88 90 Z" fill="#46b3ff" opacity="0.95"/>
    <path d="M88 90 L202 148 L142 292 L0 118 Z" fill="#0f66b5" opacity="0.95"/>
  </g>

  <g transform="translate(1120 500)">
    <rect x="0" y="0" width="260" height="210" rx="18" fill="#071424" opacity="0.85" stroke="#2b6aa4"/>
    <circle cx="130" cy="78" r="34" fill="none" stroke="url(#accent)" stroke-width="10"/>
    <rect x="76" y="112" width="108" height="60" rx="12" fill="#0d3357" stroke="#2dd4bf" stroke-width="3"/>
    <rect x="115" y="136" width="30" height="20" rx="4" fill="#2dd4bf"/>
  </g>
</svg>
